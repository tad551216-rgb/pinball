<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ピンボール">
<meta name="theme-color" content="#f5f2e9">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<title>つくる手帖ピンボール - 木のおもちゃ版</title>
<style>
  :root{
    --cream:#f5f2e9; --indigo:#2c5077; --blue:#4a6b9a; --blue-d:#35507a;
    --verm:#c9472e; --coral:#d96a52; --coral-d:#a94a36; --mustard:#d9a84e; --mustard-d:#b3873a;
    --wood:#c9a86a; --wood-d:#a8874e; --ink:#3a3a34;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    position:fixed;inset:0;overflow:hidden;
    height:100vh;height:100svh;height:100dvh;
    background:var(--cream);
    background-image:
      linear-gradient(rgba(44,80,119,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(44,80,119,.06) 1px, transparent 1px);
    background-size:24px 24px;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    touch-action:none;user-select:none;-webkit-user-select:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  header{
    width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;
    padding:8px 14px 4px;gap:8px;
  }
  .titleWrap{min-width:0;overflow:hidden;}
  #backLink{
    display:inline-block;font-size:10px;color:var(--wood-d);text-decoration:none;font-weight:700;
    letter-spacing:.08em;margin-bottom:1px;
  }
  header h1{font-size:13px;color:var(--indigo);letter-spacing:.03em;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  header h1 small{font-size:10px;color:var(--wood-d);font-weight:600;margin-left:4px;}
  .hud{display:flex;gap:6px;font-size:12px;font-weight:700;color:var(--indigo);flex-shrink:0;}
  .hud .chip{
    background:#fff;border:2px solid var(--indigo);border-radius:9px;padding:1px 6px;
    box-shadow:0 2px 0 var(--indigo);min-width:48px;text-align:center;
  }
  .hud .chip b{font-variant-numeric:tabular-nums;font-size:12px;}
  .hud .chip span{display:block;font-size:8px;color:var(--wood-d);letter-spacing:.1em;}
  #stage{flex:1;width:100%;max-width:520px;display:flex;align-items:center;justify-content:center;min-height:0;}
  canvas{display:block;border-radius:18px;}
  footer{
    width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:6px 14px calc(10px + env(safe-area-inset-bottom));
  }
  .btn{
    font-family:inherit;font-size:14px;font-weight:700;color:#fff;border:none;border-radius:14px;
    padding:10px 16px;cursor:pointer;letter-spacing:.05em;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25) !important;}
  #btnLaunch{background:var(--verm);box-shadow:0 4px 0 var(--coral-d);flex:1;font-size:16px;}
  #btnLaunch.charging{background:var(--mustard);box-shadow:0 4px 0 var(--mustard-d);color:var(--ink);}
  #btnSound,#btnReset{background:var(--blue);box-shadow:0 4px 0 var(--blue-d);font-size:12px;padding:10px 12px;}
  .hint{font-size:10px;color:var(--wood-d);text-align:center;width:100%;max-width:520px;padding-bottom:2px;}
  #overlay{
    position:fixed;inset:0;background:rgba(245,242,233,.9);display:flex;
    align-items:center;justify-content:center;z-index:10;overflow:auto;padding:20px 0;
  }
  #overlay .card{
    background:#fff;border:3px solid var(--indigo);border-radius:20px;padding:22px 28px;text-align:center;
    box-shadow:0 8px 0 var(--indigo);margin:auto;max-width:320px;
  }
  #overlay img{width:190px;max-width:70vw;display:block;margin:0 auto 8px;}
  #overlay h2{color:var(--verm);font-size:20px;margin-bottom:8px;letter-spacing:.12em;}
  #overlay p{font-size:12.5px;color:var(--indigo);font-weight:600;line-height:1.9;}
  #overlay .btn{background:var(--verm);box-shadow:0 4px 0 var(--coral-d);margin-top:14px;font-size:15px;padding:12px 34px;}
  .hidden{display:none !important;}
</style>
</head>

<script>
"use strict";
/* ================= 基本設定 ================= */
const W=400, H=700;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let scale=1, dpr=1;

function fitBoard(){
  const stage=document.getElementById('stage');
  const r=stage.getBoundingClientRect();
  const availW=r.width-8, availH=r.height-4;
  scale=Math.min(availW/W, availH/H);
  dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=Math.round(W*scale*dpr); cv.height=Math.round(H*scale*dpr);
  cv.style.width=(W*scale)+'px'; cv.style.height=(H*scale)+'px';
}
window.addEventListener('resize',fitBoard);
window.addEventListener('orientationchange',()=>setTimeout(fitBoard,300));
window.addEventListener('load',()=>{ fitBoard(); setTimeout(fitBoard,250); setTimeout(fitBoard,800); });
if(window.visualViewport) window.visualViewport.addEventListener('resize',fitBoard);

let audioCtx=null, soundOn=true;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return audioCtx; }
function tone(freq,dur,type,vol,slideTo){
  if(!soundOn) return; const a=ac(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,a.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,a.currentTime+dur);
  g.gain.setValueAtTime(vol||0.15,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.connect(g); g.connect(a.destination);
  o.start(); o.stop(a.currentTime+dur+0.02);
}

function closest(p,a,b){
  const abx=b.x-a.x, aby=b.y-a.y;
  const t=Math.max(0,Math.min(1,((p.x-a.x)*abx+(p.y-a.y)*aby)/(abx*abx+aby*aby||1)));
  return {x:a.x+t*abx, y:a.y+t*aby, t};
}
function collideSeg(a,b,rad,e){
  const c=closest(ball,a,b);
  const dx=ball.x-c.x, dy=ball.y-c.y;
  const d=Math.hypot(dx,dy), min=ball.r+(rad||0);
  if(d<min && d>0.0001){
    const nx=dx/d, ny=dy/d;
    ball.x+=nx*(min-d); ball.y+=ny*(min-d);
    const vn=ball.vx*nx+ball.vy*ny;
    if(vn<0){ ball.vx-=(1+e)*vn*nx; ball.vy-=(1+e)*vn*ny; }
    return c;
  }
  return null;
}
function clampSpeed(){
  const lim=ball.inLane?26:19;
  const sp=Math.hypot(ball.vx,ball.vy);
  if(sp>lim){ ball.vx*=lim/sp; ball.vy*=lim/sp; }
}

}

    }
  }
  for(let s=0;s<SUB;s++){
    for(const f of [flipL,flipR]){
      f.prev=f.ang;
      const tgt=f.pressed?f.up:f.rest;
      const spd=0.52/SUB;
      if(f.ang>tgt) f.ang=Math.max(tgt,f.ang-spd);
      else if(f.ang<tgt) f.ang=Math.min(tgt,f.ang+spd);
    }
    if(!ball.alive || house.rest>0) continue;

    ball.vy+=0.10;
    ball.vx*=0.9992; ball.vy*=0.9992;
    ball.x+=ball.vx/SUB; ball.y+=ball.vy/SUB;

    if(ball.inLane && ball.x<340 && ball.y<220) ball.inLane=false;

    for(const w of walls) collideSeg(w.a,w.b,0,w.e);
    if(!ball.inLane) collideSeg(gate.a,gate.b,0,0.4);

    for(const bp of bumpers){
      const dx=ball.x-bp.x, dy=ball.y-bp.y, d=Math.hypot(dx,dy);
      if(d<ball.r+bp.r && d>0.001){
        const nx=dx/d, ny=dy/d;
        ball.x=bp.x+nx*(ball.r+bp.r);
        ball.vx=nx*9.5; ball.vy=ny*9.5;
        bp.flash=12; score+=100; hud(); S.bumper();
        if(!bp.hit){ bp.hit=true; checkComplete(); }
      }
    }

    for(const sl of slings){
      const p=sl.pts;
      for(let i=0;i<3;i++){
        const a={x:p[i][0],y:p[i][1]}, b={x:p[(i+1)%3][0],y:p[(i+1)%3][1]};
        collideSeg(a,b,4,0.4);
      }
      const a={x:p[0][0],y:p[0][1]}, c2={x:p[2][0],y:p[2][1]};
      const cp=closest(ball,a,c2);
      const dx=ball.x-cp.x, dy=ball.y-cp.y, d=Math.hypot(dx,dy);
      if(d<ball.r+6){
        const nx=dx/(d||1), ny=dy/(d||1);
        ball.x+=nx*(ball.r+6-d);
        ball.vx=nx*8; ball.vy=ny*8-2;
        sl.flash=12; score+=10; hud(); S.sling();
        const g=gears.find(g=>g.sling===slings.indexOf(sl));
        if(g) g.rot+=0.6;
      }
    }

    // 家の玄関
    if(house.rest===0 && house.cool===0){
      if(Math.hypot(ball.x-house.door.x, ball.y-house.door.y)<18){
        house.rest=150; score+=300; hud();
        banner={t:160,text:'お茶とケーキで一休み'};
        if(soundOn){[659,523,392].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'sine',0.14),i*160));}
      }
    }

    for(const pad of wallPads){
      for(const [p1,p2] of [[pad.a,pad.m],[pad.m,pad.b]]){
        const cp=closest(ball,p1,p2);
        const dx=ball.x-cp.x, dy=ball.y-cp.y, d=Math.hypot(dx,dy);
        if(d<ball.r+5){
          const nx=dx/(d||1), ny=dy/(d||1);
          ball.x+=nx*(ball.r+5-d);
          ball.vx=nx*7.5; ball.vy=ny*7.5-1.5;
          pad.flash=12;
          if(!pad.lit){ pad.lit=true; score+=150; }
          else score+=30;
          hud(); S.sling();
          if(wallPads.every(p=>p.lit)){
            score+=800; hud(); S.bonus();
            banner={t:110,text:'つ く る ！'};
            setTimeout(()=>wallPads.forEach(p=>p.lit=false),900);
          }
          break;
        }
      }
    }

    for(const f of [flipL,flipR]){
      const d1=flipDir(f,f.ang);
      const tip={x:f.px+d1.x*f.len, y:f.py+d1.y*f.len};
      const c=closest(ball,{x:f.px,y:f.py},tip);
      const dx=ball.x-c.x, dy=ball.y-c.y, dd=Math.hypot(dx,dy);
      if(dd<ball.r+f.r && dd>0.0001){
        const nx=dx/dd, ny=dy/dd;
        ball.x+=nx*(ball.r+f.r-dd); ball.y+=ny*(ball.r+f.r-dd);
        const vn=ball.vx*nx+ball.vy*ny;
        if(vn<0){ ball.vx-=1.5*vn*nx; ball.vy-=1.5*vn*ny; }
        const dPrev=flipDir(f,f.prev);
        const q1={x:f.px+d1.x*f.len*c.t, y:f.py+d1.y*f.len*c.t};
        const q0={x:f.px+dPrev.x*f.len*c.t, y:f.py+dPrev.y*f.len*c.t};
        ball.vx+=(q1.x-q0.x)*SUB*1.6; ball.vy+=(q1.y-q0.y)*SUB*1.6;
      }
    }

    for(const h of holes){
      if(h.cool>0){h.cool--; continue;}
      const d=Math.hypot(ball.x-h.x, ball.y-h.y);
      if(d<h.r+2){
        if(!h.lit){ h.lit=true; score+=50; hud(); S.roll(); }
        h.cool=30;
        if(holes.every(x=>x.lit)){
          score+=500; hud(); S.bonus();
          setTimeout(()=>holes.forEach(x=>x.lit=false),600);
        }
      }
    }

    clampSpeed();

    // 詰まり防止：盤面内で3秒静止したら軽く押し出す
    if(ball.alive && !ball.inLane && house.rest===0 && !flipL.pressed && !flipR.pressed
       && Math.hypot(ball.vx,ball.vy)<0.3){
      stuck++;
      if(stuck>180*SUB/3){
        ball.vx+=(ball.x<200?2.5:-2.5); ball.vy-=3.5;
        stuck=0; S.sling();
      }
    } else stuck=0;

    if(ball.y>H+30){
      ball.alive=false; S.drain();
      balls--; hud();
      if(balls<=0){ gameOver(); }
      else setTimeout(()=>{ resetBall(); },900);
    }
  }
  if(ball.alive && !ball.inLane){
    ball.trail.push({x:ball.x,y:ball.y});
    if(ball.trail.length>16) ball.trail.shift();
  } else if(ball.trail.length) ball.trail.shift();
}

const overlay=document.getElementById('overlay');
function gameOver(){
  running=false;
  if(score>best){ best=score; try{localStorage.setItem('techoPinballBest',String(best));}catch(e){} }
  hud();
  document.getElementById('ovImg').classList.add('hidden');
  document.getElementById('ovTitle').textContent='ゲームオーバー';
  document.getElementById('ovText').innerHTML='スコア：'+score+'<br>ベスト：'+best;
  document.getElementById('btnStart').textContent='もういちど';
  overlay.style.display='flex';
}
function startGame(){
  score=0; balls=3; running=true;
  bumpers.forEach(b=>{b.flash=0;b.hit=false;});
  holes.forEach(h=>{h.lit=false;h.cool=0;});
  stamp.t=0; banner.t=0; house.rest=0; house.cool=0;
  wallPads.forEach(p=>{p.lit=false;p.flash=0;});
  resetBall(); hud(); ac();
  overlay.style.display='none';
}

/* ================= 描画 ================= */
function rounded(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function softShadow(on){
  if(on){ ctx.shadowColor='rgba(90,80,60,.28)'; ctx.shadowBlur=10; ctx.shadowOffsetY=5; }
  else { ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0; }
}
function screw(x,y,r){
  ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fillStyle='#fdfcf8'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=1; ctx.stroke();
}
function gearPath(x,y,r,teeth,rot){
  ctx.beginPath();
  const inner=r*0.78, tw=Math.PI/teeth*0.55;
  for(let i=0;i<teeth;i++){
    const a=rot+i*2*Math.PI/teeth;
    ctx.arc(x,y,inner,a+tw,a+2*Math.PI/teeth-tw);
    const a2=a+2*Math.PI/teeth-tw, a3=a+2*Math.PI/teeth+tw;
    ctx.lineTo(x+Math.cos(a2)*r, y+Math.sin(a2)*r);
    ctx.arc(x,y,r,a2,a3);
    ctx.lineTo(x+Math.cos(a3)*inner, y+Math.sin(a3)*inner);
  }
  ctx.closePath();
}
function drawGear(g){
  softShadow(true);
  ctx.fillStyle='rgba(0,0,0,.10)';
  gearPath(g.x,g.y+4,g.r,g.teeth,g.rot); ctx.fill();
  softShadow(false);
  gearPath(g.x,g.y,g.r,g.teeth,g.rot);
  ctx.fillStyle=g.c1; ctx.fill();
  ctx.beginPath(); ctx.arc(g.x,g.y,g.r*0.5,0,7);
  ctx.strokeStyle=g.c2; ctx.lineWidth=Math.max(3,g.r*0.16); ctx.stroke();
  screw(g.x,g.y,Math.max(3.5,g.r*0.14));
}
function drawCapsule(x1,y1,x2,y2,r,fill,side){
  ctx.beginPath(); ctx.lineCap='round'; ctx.lineWidth=r*2;
  ctx.strokeStyle=side; ctx.moveTo(x1,y1+5); ctx.lineTo(x2,y2+5); ctx.stroke();
  ctx.beginPath(); ctx.strokeStyle=fill; ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}

function draw(){
  ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
  ctx.clearRect(0,0,W,H);

  rounded(6,6,W-12,H-12,22);
  ctx.fillStyle='#f2eee2'; ctx.fill();
  ctx.save(); ctx.clip();
  ctx.strokeStyle='rgba(44,80,119,.07)'; ctx.lineWidth=1;
  for(let x=6;x<W;x+=22){ ctx.beginPath(); ctx.moveTo(x,6); ctx.lineTo(x,H-6); ctx.stroke(); }
  for(let y=6;y<H;y+=22){ ctx.beginPath(); ctx.moveTo(6,y); ctx.lineTo(W-6,y); ctx.stroke(); }

  for(const g of gears){ g.rot+=g.spd; if(g.sling==null) drawGear(g); }

  for(const h of holes){
    softShadow(false);
    ctx.beginPath(); ctx.arc(h.x,h.y,h.r+5,0,7); ctx.fillStyle='#d9a84e'; ctx.fill();
    ctx.beginPath(); ctx.arc(h.x,h.y,h.r,0,7);
    ctx.fillStyle=h.lit?'#e8b64e':'#4b4741'; ctx.fill();
    if(h.lit){
      const gr=ctx.createRadialGradient(h.x,h.y,1,h.x,h.y,h.r);
      gr.addColorStop(0,'rgba(255,240,180,.95)'); gr.addColorStop(1,'rgba(232,182,78,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(h.x,h.y,h.r,0,7); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(h.x,h.y-3,h.r*0.55,0,7); ctx.fillStyle='rgba(255,255,255,.06)'; ctx.fill();
    }
  }

  softShadow(true);
  ctx.lineCap='round';
  ctx.strokeStyle='#c9a86a'; ctx.lineWidth=12;
  ctx.beginPath(); ctx.moveTo(20,520); ctx.lineTo(112,606); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(350,552); ctx.lineTo(288,606); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(350,190); ctx.lineTo(350,552); ctx.stroke();
  softShadow(false);
  ctx.strokeStyle='#dcbd82'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(20,520); ctx.lineTo(112,606); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(350,552); ctx.lineTo(288,606); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(350,190); ctx.lineTo(350,552); ctx.stroke();
  ctx.strokeStyle='#7a9b6d'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(350,190); ctx.lineTo(377,158); ctx.stroke();

  /* RGBマスコットの家 */
  (function(){
    // 本体（右壁のくぼみ風）
    softShadow(true);
    rounded(318,376,32,56,6); ctx.fillStyle='#e5d9bd'; ctx.fill();
    softShadow(false);
    rounded(320,374,30,56,6); ctx.fillStyle='#f7f4ec'; ctx.fill();
    // 屋根（朱）
    ctx.beginPath(); ctx.moveTo(314,372); ctx.lineTo(352,352); ctx.lineTo(352,372); ctx.closePath();
    ctx.fillStyle='#d96a52'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(314,372); ctx.lineTo(352,352);
    ctx.strokeStyle='#a94a36'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
    // 煙突
    ctx.fillStyle='#c9a86a'; ctx.fillRect(340,344,7,12);
    // 丸窓（家族が見える）
    ctx.beginPath(); ctx.arc(335,392,11,0,7); ctx.fillStyle='#fff'; ctx.fill();
    const fam=document.getElementById('ovImg');
    if(fam && fam.complete && fam.naturalWidth>0){
      ctx.save(); ctx.beginPath(); ctx.arc(335,392,10,0,7); ctx.clip();
      ctx.drawImage(fam,335-14,392-11,28,24); ctx.restore();
    }
    ctx.beginPath(); ctx.arc(335,392,11,0,7);
    ctx.strokeStyle='#c9a86a'; ctx.lineWidth=3; ctx.stroke();
    // 玄関（アーチ）
    ctx.beginPath(); ctx.arc(house.door.x,432,13,Math.PI,0); ctx.lineTo(house.door.x+13,432); ctx.closePath();
    ctx.fillStyle=house.rest>0?'#6b5d4a':'#4b4741'; ctx.fill();
    // 一休み中：湯気とお茶とケーキ
    if(house.rest>0){
      const bob=Math.sin(Date.now()/300)*2;
      ctx.font='20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('☕',300,382+bob);
      ctx.fillText('🍰',278,396-bob);
      ctx.strokeStyle='rgba(120,110,95,.5)'; ctx.lineWidth=2; ctx.lineCap='round';
      for(const ox of [-4,3]){
        ctx.beginPath();
        const ph=Date.now()/240+ox;
        for(let i=0;i<=8;i++){
          const y=370-i*3+bob, x=300+ox+Math.sin(ph+i*0.8)*2.5;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
    }
  })();

  for(const sl of slings){
    const p=sl.pts;
    softShadow(true);
    ctx.beginPath(); ctx.moveTo(p[0][0],p[0][1]+5); ctx.lineTo(p[1][0],p[1][1]+5); ctx.lineTo(p[2][0],p[2][1]+5); ctx.closePath();
    ctx.fillStyle='#35507a'; ctx.lineJoin='round'; ctx.lineWidth=10; ctx.strokeStyle='#35507a'; ctx.stroke(); ctx.fill();
    softShadow(false);
    ctx.beginPath(); ctx.moveTo(p[0][0],p[0][1]); ctx.lineTo(p[1][0],p[1][1]); ctx.lineTo(p[2][0],p[2][1]); ctx.closePath();
    ctx.fillStyle='#4a6b9a'; ctx.strokeStyle='#4a6b9a'; ctx.stroke(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(p[0][0],p[0][1]); ctx.lineTo(p[2][0],p[2][1]);
    ctx.strokeStyle=sl.flash>0?'#ffb08c':'#d96a52'; ctx.lineWidth=7; ctx.lineCap='round'; ctx.stroke();
    if(sl.flash>0) sl.flash--;
    screw(p[0][0],p[0][1],4); screw(p[1][0],p[1][1],4);
  }
  for(const g of gears){ if(g.sling!=null) drawGear(g); }

  /* 壁面ターゲット つ・く・る */
  for(const pad of wallPads){
    softShadow(true);
    ctx.beginPath(); ctx.moveTo(pad.a.x,pad.a.y+4); ctx.lineTo(pad.m.x,pad.m.y+4); ctx.lineTo(pad.b.x,pad.b.y+4); ctx.closePath();
    ctx.fillStyle='#a8874e'; ctx.lineJoin='round'; ctx.lineWidth=8; ctx.strokeStyle='#a8874e'; ctx.stroke(); ctx.fill();
    softShadow(false);
    ctx.beginPath(); ctx.moveTo(pad.a.x,pad.a.y); ctx.lineTo(pad.m.x,pad.m.y); ctx.lineTo(pad.b.x,pad.b.y); ctx.closePath();
    ctx.fillStyle='#c9a86a'; ctx.strokeStyle='#c9a86a'; ctx.stroke(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(pad.a.x,pad.a.y); ctx.lineTo(pad.m.x,pad.m.y); ctx.lineTo(pad.b.x,pad.b.y);
    ctx.strokeStyle=pad.flash>0?'#ffb08c':'#d96a52'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
    if(pad.flash>0) pad.flash--;
    const lx=pad.a.x<200?pad.m.x-9:pad.m.x+9;
    ctx.beginPath(); ctx.arc(lx,pad.m.y,9,0,7);
    ctx.fillStyle=pad.lit?'#e8b64e':'#f7f4ec'; ctx.fill();
    ctx.strokeStyle=pad.lit?'#b3873a':'rgba(0,0,0,.12)'; ctx.lineWidth=1.5; ctx.stroke();
    if(pad.lit){
      const gr=ctx.createRadialGradient(lx,pad.m.y,1,lx,pad.m.y,16);
      gr.addColorStop(0,'rgba(255,236,170,.7)'); gr.addColorStop(1,'rgba(255,236,170,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(lx,pad.m.y,16,0,7); ctx.fill();
    }
    ctx.fillStyle='#2c5077'; ctx.font='700 11px -apple-system,"Hiragino Sans",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pad.label,lx,pad.m.y+0.5);
  }

  /* バンパー（マスコット入り） */
  for(const bp of bumpers){
    softShadow(true);
    ctx.beginPath(); ctx.arc(bp.x,bp.y+5,bp.r,0,7); ctx.fillStyle='#a94a36'; ctx.fill();
    softShadow(false);
    ctx.beginPath(); ctx.arc(bp.x,bp.y,bp.r,0,7); ctx.fillStyle=bp.flash>0?'#e88a6e':'#d96a52'; ctx.fill();
    ctx.beginPath(); ctx.arc(bp.x,bp.y,bp.r-5,0,7); ctx.fillStyle='#f7f4ec'; ctx.fill();
    const im=mascImg[bp.key];
    if(im && im.complete && im.naturalWidth>0){
      ctx.save();
      ctx.beginPath(); ctx.arc(bp.x,bp.y,bp.r-6,0,7); ctx.clip();
      const rr=(bp.r-6)*2;
      ctx.drawImage(im,bp.x-rr/2,bp.y-rr/2,rr,rr);
      ctx.restore();
    } else {
      ctx.fillStyle='#2c5077'; ctx.font='700 20px -apple-system,"Hiragino Sans",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(bp.label,bp.x,bp.y+1);
    }
    /* たたいた印：金のリング */
    if(bp.hit){
      ctx.beginPath(); ctx.arc(bp.x,bp.y,bp.r+3,0,7);
      ctx.strokeStyle='#d9a84e'; ctx.lineWidth=4; ctx.stroke();
    }
    if(bp.flash>0){
      const gr=ctx.createRadialGradient(bp.x,bp.y,2,bp.x,bp.y,bp.r+14);
      gr.addColorStop(0,'rgba(255,220,150,.8)'); gr.addColorStop(1,'rgba(255,220,150,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(bp.x,bp.y,bp.r+14,0,7); ctx.fill();
      bp.flash--;
    }
    /* 木の名札 */
    softShadow(false);
    rounded(bp.x-14,bp.y+bp.r+3,28,16,5);
    ctx.fillStyle='#c9a86a'; ctx.fill();
    ctx.fillStyle='#3a3a34'; ctx.font='700 11px -apple-system,"Hiragino Sans",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(bp.label,bp.x,bp.y+bp.r+11.5);
  }

  /* プランジャー */
  (function(){
    const baseY=596, topY=560+plunger.power*26;
    ctx.strokeStyle='#9aa0a6'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath();
    const coils=6;
    for(let i=0;i<=coils*8;i++){
      const t=i/(coils*8);
      const y=baseY-(baseY-topY-14)*t;
      const x=366+Math.sin(t*coils*2*Math.PI)*9;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    softShadow(true);
    ctx.beginPath(); ctx.arc(366,topY-16,10,0,7); ctx.fillStyle='#c9472e'; ctx.fill();
    softShadow(false);
    screw(366,topY-16,3.5);
  })();

  /* フリッパー */
  for(const f of [flipL,flipR]){
    const d=flipDir(f,f.ang);
    const tip={x:f.px+d.x*f.len, y:f.py+d.y*f.len};
    softShadow(true);
    drawCapsule(f.px,f.py,tip.x,tip.y,f.r,'#4a6b9a','#35507a');
    softShadow(false);
    screw(f.px,f.py,5);
    screw(tip.x,tip.y,3.5);
  }

  /* ボール軌跡 */
  if(ball.trail.length>2){
    for(const [col,off] of [['rgba(150,200,235,.55)',-3],['rgba(235,215,150,.55)',3]]){
      ctx.beginPath();
      for(let i=0;i<ball.trail.length;i++){
        const p=ball.trail[i];
        if(i===0) ctx.moveTo(p.x+off,p.y+off); else ctx.lineTo(p.x+off,p.y+off);
      }
      ctx.strokeStyle=col; ctx.lineWidth=5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    }
  }

  /* ボール */
  if(ball.alive){
    const gr=ctx.createRadialGradient(ball.x,ball.y,1,ball.x,ball.y,ball.r*2.4);
    gr.addColorStop(0,'rgba(255,250,235,.95)');
    gr.addColorStop(0.4,'rgba(255,225,170,.45)');
    gr.addColorStop(1,'rgba(255,225,170,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r*2.4,0,7); ctx.fill();
    const gb=ctx.createRadialGradient(ball.x-4,ball.y-4,1,ball.x,ball.y,ball.r);
    gb.addColorStop(0,'#ffffff'); gb.addColorStop(0.7,'#fff3dc'); gb.addColorStop(1,'#f2d9a8');
    ctx.fillStyle=gb; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(ball.x-3.5,ball.y-4,3,0,7); ctx.fillStyle='rgba(255,255,255,.95)'; ctx.fill();
  }

  /* バナー（つくる！など） */
  if(banner.t>0){
    const fade=banner.t<20?banner.t/20:1;
    ctx.save(); ctx.globalAlpha=fade;
    softShadow(true);
    rounded(96,438,208,36,10); ctx.fillStyle='#c9a86a'; ctx.fill();
    softShadow(false);
    rounded(101,442,198,28,8); ctx.fillStyle='#f7f4ec'; ctx.fill();
    ctx.fillStyle='#c9472e'; ctx.font='700 17px -apple-system,"Hiragino Sans",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(banner.text,200,456.5);
    ctx.restore();
    banner.t--;
  }

  /* 朱印（完成スタンプ） */
  if(stamp.t>0){
    const prog=Math.min(1,(110-stamp.t)/14);          // 押される動き
    const fade=stamp.t<25?stamp.t/25:1;               // 消えるとき
    const cx=200, cy=330;
    const sc=1.7-0.7*prog;
    ctx.save();
    ctx.globalAlpha=fade*0.95;
    ctx.translate(cx,cy); ctx.scale(sc,sc); ctx.rotate(-0.12);
    ctx.beginPath(); ctx.arc(0,0,54,0,7);
    ctx.strokeStyle='#c9472e'; ctx.lineWidth=6; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,46,0,7);
    ctx.strokeStyle='#c9472e'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#c9472e';
    ctx.font='700 40px "Hiragino Mincho ProN","Yu Mincho",serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('完',0,-20); ctx.fillText('成',0,22);
    ctx.restore();
    stamp.t--;
  }

  ctx.restore();

  /* 外枠 */
  softShadow(false);
  ctx.lineWidth=14; ctx.strokeStyle='#2c5077';
  rounded(7,7,W-14,H-14,22); ctx.stroke();
  ctx.lineWidth=4; ctx.strokeStyle='#c9a86a';
  rounded(16,16,W-32,H-32,16); ctx.stroke();
  screw(24,24,4.5); screw(W-24,24,4.5); screw(24,H-24,4.5); screw(W-24,H-24,4.5);
}

/* ================= 入力 ================= */
function setFlip(side,down){
  const f=(side==='L')?flipL:flipR;
  if(down && !f.pressed) S.flipper();
  f.pressed=down;
}
document.addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(e.key==='ArrowLeft'||e.key==='z') setFlip('L',true);
  if(e.key==='ArrowRight'||e.key==='/') setFlip('R',true);
  if(e.key===' '){ e.preventDefault(); startCharge(); }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='z') setFlip('L',false);
  if(e.key==='ArrowRight'||e.key==='/') setFlip('R',false);
  if(e.key===' ') releaseCharge();
});
const touchSides={};
cv.addEventListener('touchstart',e=>{
  e.preventDefault(); ac();
  for(const t of e.changedTouches){
    const side=(t.clientX<window.innerWidth/2)?'L':'R';
    touchSides[t.identifier]=side; setFlip(side,true);
  }
},{passive:false});
function endTouch(e){
  for(const t of e.changedTouches){
    const side=touchSides[t.identifier];
    if(side){ delete touchSides[t.identifier];
      if(!Object.values(touchSides).includes(side)) setFlip(side,false);
    }
  }
}
cv.addEventListener('touchend',e=>{e.preventDefault();endTouch(e);},{passive:false});
cv.addEventListener('touchcancel',endTouch);
cv.addEventListener('mousedown',e=>{
  ac();
  setFlip(e.clientX<window.innerWidth/2?'L':'R',true);
});
cv.addEventListener('mouseup',()=>{ setFlip('L',false); setFlip('R',false); });

/* 発射 */
const btnLaunch=document.getElementById('btnLaunch');
function startCharge(){
  if(!running||!ball.alive||!ball.inLane) return;
  plunger.charging=true; btnLaunch.classList.add('charging'); ac();
}
function releaseCharge(){
  if(!plunger.charging) return;
  plunger.charging=false; btnLaunch.classList.remove('charging');
  if(running && ball.alive && ball.inLane){
    ball.vy=-(14+plunger.power*10);
    S.launch();
  }
  plunger.power=0;
}
btnLaunch.addEventListener('touchstart',e=>{e.preventDefault();startCharge();},{passive:false});
btnLaunch.addEventListener('touchend',e=>{e.preventDefault();releaseCharge();},{passive:false});
btnLaunch.addEventListener('mousedown',startCharge);
btnLaunch.addEventListener('mouseup',releaseCharge);
btnLaunch.addEventListener('mouseleave',releaseCharge);

document.getElementById('btnSound').addEventListener('click',function(){
  soundOn=!soundOn; this.textContent=soundOn?'音 ON':'音 OFF'; ac();
});
document.getElementById('btnReset').addEventListener('click',startGame);
document.getElementById('btnStart').addEventListener('click',startGame);

/* iOSズーム抑止 */
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('dblclick', e=>e.preventDefault());

/* スタンドアロン時は戻るリンク非表示 */
(function(){
  try{
    const standalone=(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone===true;
    if(standalone){
      document.getElementById('backLink').classList.add('hidden');
      document.querySelector('.hint').classList.add('hidden');
      setTimeout(fitBoard,50);
    }
  }catch(e){}
})();

/* ================= メインループ ================= */
function loop(){
  if(plunger.charging) plunger.power=Math.min(1,plunger.power+0.025);
  if(running) stepPhysics();
  draw();
  requestAnimationFrame(loop);
}
fitBoard(); hud(); resetBall();
requestAnimationFrame(loop);

/* サービスワーカー */
if('serviceWorker' in navigator){
  addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
